<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBC Hanakotoba Quiz | ค้นหาดอกไม้ในใจคุณ</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        /* --- คงส่วน CSS เดิมของคุณไว้ทั้งหมด เพื่อรักษา UI และแอนิเมชัน --- */
        :root {
            --sky-blue: #e0f7fa; 
            --sakura-pink: #ffebee; 
            --text-color: #4e443f; 
            --accent-color: #d7ccc8; 
            --card-bg: rgba(255, 255, 255, 0.9); 
            --primary-btn: #a1887f; 
        }

        body {
            font-family: 'Itim', cursive;
            background-color: var(--sky-blue);
            background-image: linear-gradient(180deg, var(--sky-blue) 0%, var(--sakura-pink) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; 
        }

        .cherry-blossom-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150px 10px 150px 10px;
            opacity: 0.8;
            animation: fadeout 5s infinite, fall 10s infinite;
        }

        @keyframes fadeout { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } }
        @keyframes fall {
            0% { top: -10%; transform: translateX(0px) rotate(0deg); }
            100% { top: 110%; transform: translateX(100px) rotate(360deg); }
        }

        /* กลีบซากุระ 7 กลีบตามต้นฉบับ */
        .petal:nth-child(1) { width: 10px; height: 10px; left: 10%; animation-delay: 0s; }
        .petal:nth-child(2) { width: 15px; height: 15px; left: 20%; animation-delay: 2s; }
        .petal:nth-child(3) { width: 8px; height: 8px; left: 35%; animation-delay: 4s; }
        .petal:nth-child(4) { width: 12px; height: 12px; left: 50%; animation-delay: 1s; }
        .petal:nth-child(5) { width: 18px; height: 18px; left: 65%; animation-delay: 3s; }
        .petal:nth-child(6) { width: 10px; height: 10px; left: 80%; animation-delay: 5s; }
        .petal:nth-child(7) { width: 14px; height: 14px; left: 90%; animation-delay: 2.5s; }

        #quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 90%; 
            width: 400px;
            text-align: center;
            position: relative;
            z-index: 1; 
            margin: 20px;
        }

        h1 { font-size: 2em; margin-top: 10px; font-weight: 500;}
        h3 { font-size: 1.2em; line-height: 1.4; font-weight: 300;}
        p { font-size: 1em; line-height: 1.6; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px; 
            margin: 15px 0;
            border: 2px solid var(--accent-color);
            background: white;
            color: var(--text-color);
            border-radius: 50px; 
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
            box-sizing: border-box; 
            font-family: 'Itim', cursive;
        }

        .btn:hover {
            background: #faf8f6;
            transform: translateY(-2px);
            border-color: #bcaaa4;
        }

        .btn-main { background: var(--primary-btn); color: white; border: none; }
        .btn-main:hover { background: #8d6e63; }

        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 20px; 
            margin: 20px 0; 
            border: 5px solid #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .hidden { display: none; }
        .result-info { 
            text-align: left; 
            background: rgba(250, 248, 246, 0.8); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0; 
            font-size: 18px;
        }
	/* เพิ่มส่วนนี้เข้าไปเพื่อเจาะจงขนาดตัวอักษรในย่อหน้า */
        .result-info p {
            font-size: 18px; /* ปรับขนาดตามความต้องการ เช่น 18px หรือ 20px */
            margin: 10px 0;  /* เพิ่มระยะห่างระหว่างบรรทัดให้ดูสบายตาขึ้น */
        }

        /* หากต้องการให้หัวข้อ "ความหมาย:" หรือ "เกร็ดน่ารู้:" ใหญ่เป็นพิเศษ */
        .result-info strong {
            font-size: 20px; 
            color: #a1887f;
        }
        .progress { font-size: 12px; color: #a1887f; margin-bottom: 15px; }
        hr { border: 0.5px solid #f1e0db; margin: 25px 0; }
    </style>
</head>
<body>

<div class="cherry-blossom-container">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div>
</div>

<div id="quiz-container">
    <div id="start-page">
        <h1 style="font-size: 3em; margin-bottom: 0;">🌸</h1>
        <h1>Hanakotoba Quiz</h1>
        <p>ฤดูใบไม้ผลิมาถึงแล้ว...<br>มาค้นหาดอกไม้ที่สะท้อนตัวตนของคุณกัน</p>
        <button class="btn btn-main" onclick="startQuiz()">เริ่มการเดินทาง</button>
    	<p style="font-size: 0.8em; color: #a1887f; margin-top: 20px;">Created by กลุ่มฤดูใบไม้ผลิ</p>
    </div>

    <div id="question-page" class="hidden">
        <div class="progress" id="progress-text">คำถามที่ 1 จาก 7</div>
        <h3 id="question-text">...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <p style="margin-bottom: 5px; color: #a1887f;">ดอกไม้ประจำใจคุณคือ</p>
        <h1 id="flower-name" style="margin-top: 0;">ชื่อดอกไม้</h1>
        <img id="flower-img" src="" alt="Flower result">
        <div class="result-info">
            <p><strong>ความหมาย:</strong> <span id="flower-meaning"></span></p>
            <p><strong>เกร็ดน่ารู้:</strong> <span id="flower-note"></span></p>
        </div>
        <hr>
        <h3 style="font-weight: 500; font-size: 1.1em;">ลองทำดอกไม้ของคุณดูไหม? ✨</h3>
        <a id="flower-video" href="#" target="_blank" class="btn btn-main" style="text-decoration: none;">ดูวิธีทำดอกไม้ด้วยตัวเอง</a>
        <button class="btn" onclick="location.reload()" style="font-size: 14px; border: none; color: #a1887f; background: none; font-family: 'Itim', cursive;">ทำแบบทดสอบใหม่</button>
	<p style="font-size: 0.8em; color: #a1887f; margin-bottom: 10px;">Created by กลุ่มฤดูใบไม้ผลิ</p>
    </div>
</div>

<script>
    const flowers = {
        Sakura: { name: "ซากุระ (Sakura)", meaning: "ความงามของจิตวิญญาณ การเริ่มต้นใหม่", note: "เป็นดอกไม้ประจำชาติญี่ปุ่น ชื่อมาจากเทพธิดาซากุยะ และยังปรากฏบนธนบัตร 1,000 เยนกับเหรียญ 100 เยน ด้วย", img: "sakura.png", video: "https://www.youtube.com/watch?v=halmrlPLJj0" },
        Wisteria: { name: "วิสทีเรีย (Wisteria / Fuji)", meaning: "เมามายในความรักของคุณ ใจดี และการต้อนรับ", note: "ปรากฎอยู่ในตำนานเก่าแก่ของญี่ปุ่นอย่าง 'ตำนานเก็นจิ' และเป็นดอกไม้ที่ใช้ขับไล่อสูรในเรื่องดาบพิฆาตอสูร", img: "fuji.png", video: "https://www.youtube.com/shorts/ny7mo7mBkMU" },
        Nemophila: { name: "เนโมฟีล่า (Nemophila)", meaning: "ประสบความสำเร็จในทุกที่ ความละเอียดอ่อน และการให้อภัย และยังเป็นสัญลักษณ์ของการไม่ยึดติดกับความงาม", note: "เป็นดอกไม้ประจำตัวของผู้กล้าฮิมเมลจากเรื่อง Sousou no Frieren", img: "nemophila.png", video: "https://www.youtube.com/watch?v=nROfBlb4PIY" },
        Nanohana: { name: "นาโนะฮานะ (Nanohana)", meaning: "ความสุขเล็ก ๆ ความมีชีวิตชีวา และความมั่งคั่ง", note: "ชื่อมีความหมายตรงตัวว่า 'ดอกไม้ผัก' เพราะนิยมนำไปประกอบอาหารหรือทำน้ำมัน", img: "nanohana.png", video: "https://www.youtube.com/watch?v=A5USx5a2wio" },
        Hydrangea: { name: "ไฮเดรนเยีย (Hydrangea / Ajisai)", meaning: "ความกลมกลืน ความไม่แน่นอน และความไม่เที่ยงแท้", note: "สีของดอกเปลี่ยนตามสภาพดิน ผู้คนมักนำดอกไฮเดรนเยียมอบเป็นของขวัญในเทศกาลต่าง ๆ  แต่ต้องระวังเพราะมีพิษทั้งต้น", img: "ajisai.png", video: "https://www.youtube.com/shorts/P0JEqNPEut4" },
        Gerbera: { name: "เยอบีร่า (Gerbera)", meaning: "ก้าวไปข้างหน้าอยู่เสมอ และความหวัง", note: "ก้านดอกจะเติบโตโดยเงยหน้าขึ้นเสมอ และเป็นดอกไม้ที่เด็นจิมอบให้เรเซ่ใน Chainsaw Man", img: "gerbera.png", video: "https://www.youtube.com/watch?v=ST6TwpFHl-Q" },
        Tsubaki: { name: "สึบากิ (Camellia)", meaning: "ความงดงามที่เรียบง่าย และความสมบูรณ์แบบ", note: "ปรากฏในวรรณกรรมญี่ปุ่นมานานกว่าพันปี ปัจจุบันเป็นส่วนประกอบยอดนิยมในเครื่องสำอางญี่ปุ่น", img: "tsubaki.png", video: "https://www.youtube.com/watch?v=g1p58FSvsRY" }
    };

const questions = [
    // --- หมวดตัวตน (Core Identity) ---
    { q: "1. เมื่อต้องเริ่มต้นทำสิ่งใหม่ที่ไม่คุ้นเคย คุณรู้สึกอย่างไร?", options: [{t:"ตื่นเต้นและพร้อมจะผลิบาน", s:["Sakura"]}, {t:"นิ่งสงบเพื่อรอดูจังหวะที่เหมาะสม", s:["Tsubaki"]}, {t:"กังวลแต่ไม่ลดละความพยายาม", s:["Gerbera"]}] },
    { q: "2. คุณให้ความสำคัญกับสิ่งใดในความสัมพันธ์มากที่สุด?", options: [{t:"การต้อนรับและความใจดี", s:["Wisteria"]}, {t:"การให้อภัยและความเข้าใจ", s:["Nemophila"]}, {t:"ความสดใสและพลังงานบวก", s:["Nanohana"]}] },
    { q: "3. ในวันที่ท้องฟ้าไม่เป็นใจและทุกอย่างเปลี่ยนแปลง คุณจะ...", options: [{t:"ปรับตัวลื่นไหลไปตามสถานการณ์", s:["Hydrangea"]}, {t:"รักษาความสงบสยบความเคลื่อนไหว", s:["Tsubaki"]}, {t:"มองหาการเริ่มต้นใหม่เสมอ", s:["Sakura"]}] },
    { q: "4. อะไรคือสิ่งที่ทำให้คุณภูมิใจในตัวเองที่สุด?", options: [{t:"ความใจดีที่มอบให้คนรอบข้าง", s:["Wisteria"]}, {t:"ความสุขเล็กๆ ที่สร้างได้เอง", s:["Nanohana"]}, {t:"ความมุ่งมั่นที่ไม่เคยยอมแพ้", s:["Gerbera"]}] },

    // --- หมวดอารมณ์และสังคม (Emotion & Social) ---
    { q: "5. เมื่อเห็นเพื่อนกำลังเศร้า คุณจะเข้าไปหาเขาแบบไหน?", options: [{t:"ปลอบโยนด้วยความละเอียดอ่อน", s:["Nemophila"]}, {t:"รับฟังอย่างกลมกลืนและเข้าใจ", s:["Hydrangea"]}, {t:"ชวนทำกิจกรรมสนุกๆ ให้ลืมความเศร้า", s:["Nanohana"]}] },
    { q: "6. คุณรับมือกับความผิดพลาดของตัวเองอย่างไร?", options: [{t:"ให้อภัยตัวเองและเรียนรู้", s:["Nemophila"]}, {t:"ก้าวต่อไปโดยไม่หันหลังกลับ", s:["Gerbera"]}, {t:"ยอมรับความไม่แน่นอนของชีวิต", s:["Hydrangea"]}] },
    { q: "7. บรรยากาศแบบไหนที่ทำให้คุณรู้สึกสบายใจที่สุด?", options: [{t:"ความเรียบง่ายที่สมบูรณ์แบบ", s:["Tsubaki"]}, {t:"การต้อนรับที่แสนอบอุ่น", s:["Wisteria"]}, {t:"ความละมุนละไมของการเริ่มต้น", s:["Sakura"]}] },

    // --- หมวดแรงจูงใจ (Motivation) ---
    { q: "8. คุณอยากให้คนอื่นจดจำคุณในภาพลักษณ์ใด?", options: [{t:"คนที่มีจิตวิญญาณสวยงาม", s:["Sakura"]}, {t:"คนที่มีความมั่งคั่งทางจิตใจ", s:["Nanohana"]}, {t:"คนที่เป็นที่พักพิงให้ผู้อื่น", s:["Wisteria"]}] },
    { q: "9. เมื่อมีความขัดแย้งในกลุ่ม คุณมักจะเป็นคน...", options: [{t:"คอยประสานความกลมกลืน", s:["Hydrangea"]}, {t:"ใช้ความสงบสยบความวุ่นวาย", s:["Tsubaki"]}, {t:"ใช้ความใจดีแก้ไขปัญหา", s:["Wisteria"]}] },
    { q: "10. พลังใจที่ทำให้คุณไม่ยอมแพ้คือสิ่งใด?", options: [{t:"ความหวังที่สดใสในวันพรุ่งนี้", s:["Gerbera"]}, {t:"ความสำเร็จที่รออยู่ในทุกที่", s:["Nemophila"]}, {t:"ความร่าเริงที่มีอยู่ในตัวเสมอ", s:["Nanohana"]}] },

    // --- หมวดเป้าหมาย (Goals) ---
    { q: "11. หากต้องเลือกทางเดินชีวิต คุณจะเลือกทางที่...", options: [{t:"เต็มไปด้วยการผจญภัยใหม่ๆ", s:["Sakura"]}, {t:"มีความสงบและมั่นคง", s:["Tsubaki"]}, {t:"สามารถปรับเปลี่ยนได้ตามใจ", s:["Hydrangea"]}] },
    { q: "12. สิ่งที่ทำให้คุณรู้สึกว่าตัวเองมีคุณค่าคือการได้...", options: [{t:"เป็นแรงบันดาลใจให้ผู้อื่น", s:["Gerbera"]}, {t:"เป็นผู้ที่รู้จักการให้อภัย", s:["Nemophila"]}, {t:"เป็นที่รักของคนรอบข้าง", s:["Wisteria"]}] },
    { q: "13. ความสุขที่เรียบง่ายที่สุดของคุณคือ?", options: [{t:"การได้เห็นผลผลิตที่งอกงาม", s:["Nanohana"]}, {t:"การได้อยู่ท่ามกลางธรรมชาติ", s:["Nemophila"]}, {t:"การได้ทำสิ่งที่รักอย่างตั้งใจ", s:["Gerbera"]}] },
    { q: "14. คำนิยามของชีวิตที่ลงตัวสำหรับคุณคืออะไร?", options: [{t:"การผลิบานอย่างสง่างาม", s:["Sakura"]}, {t:"ความกลมกลืนที่ลงตัว", s:["Hydrangea"]}, {t:"ความเรียบง่ายที่ไร้ที่ติ", s:["Tsubaki"]}] }
];
    let currentStep = 0;
    let scores = { Sakura:0, Wisteria:0, Nemophila:0, Nanohana:0, Hydrangea:0, Gerbera:0, Tsubaki:0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= questions.length) return showResult();
        const q = questions[currentStep];
        document.getElementById('progress-text').innerText = `คำถามที่ ${currentStep + 1} จาก ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.t;
            btn.onclick = () => { opt.s.forEach(f => scores[f]++); currentStep++; showQuestion(); };
            container.appendChild(btn);
        });
    }

    function showResult() {
    document.getElementById('question-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');

    // 1. หาคะแนนสูงสุด
    const maxScore = Math.max(...Object.values(scores));
    
    // 2. ดึงรายชื่อดอกไม้ที่มีคะแนนเท่ากับคะแนนสูงสุด (เพื่อเช็กกรณี Tie)
    const topFlowers = Object.keys(scores).filter(key => scores[key] === maxScore);
    
    // 3. ระบบ Tie-breaker: ถ้ามีมากกว่า 1 ให้สุ่มจากกลุ่มที่ได้คะแนนสูงสุดนั้น
    const winnerKey = topFlowers[Math.floor(Math.random() * topFlowers.length)];
    
    const res = flowers[winnerKey];
    document.getElementById('flower-name').innerText = res.name;
    document.getElementById('flower-meaning').innerText = res.meaning;
    document.getElementById('flower-note').innerText = res.note;
    document.getElementById('flower-img').src = res.img;
    document.getElementById('flower-video').href = res.video;
}
</script>

</body>
</html>
